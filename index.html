.city-name{font-family:'Cormorant Garamond',serif;font-size:30px;font-style:italic;line-height:1}
.city-dr{font-size:10px;color:var(--faint);margin-top:4px;letter-spacing:.05em;text-transform:uppercase}

.pif{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:44px;transition:opacity .3s}

.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}

// ── STATE ────────────────────────────────────────────────
let tab="tokyo1", view="dias";
let checks={};
try{checks=JSON.parse(localStorage.getItem('jp_b')||'{}');}catch(e){}
function save(){try{localStorage.setItem('jp_b',JSON.stringify(checks));}catch(e){}}

function toggle(id){
  checks[id]=!checks[id];save();
  const row=document.getElementById('r_'+id);
  if(!row)return;
  row.querySelector('.bchk').classList.toggle('done',!!checks[id]);
  row.querySelector('.bchk').textContent=checks[id]?'✓':'';
  row.querySelector('.bl').classList.toggle('done',!!checks[id]);
}

// ── WIKIPEDIA IMAGE FETCHER ──────────────────────────────
// MediaWiki API with origin=* — explicit CORS support, more reliable than REST v1
async function fetchWikiThumb(wikiTitle, imgEl, fallbackEl){
  try{
    const api='https://en.wikipedia.org/w/api.php?action=query&prop=pageimages&pithumbsize=800&format=json&origin=*&titles='+encodeURIComponent(wikiTitle);
    const res=await fetch(api);
    if(!res.ok)return;
    const data=await res.json();
    const pages=data.query&&data.query.pages;
    if(!pages)return;
    const page=Object.values(pages)[0];
    if(page&&page.thumbnail&&page.thumbnail.source){
      imgEl.onload=()=>{imgEl.classList.add('loaded');fallbackEl.style.opacity='0';};
      imgEl.src=page.thumbnail.source;
    }
  }catch(e){/* fallback emoji stays */}
}

          const done=!!checks[b.id];

    return;
  }

  // ── DÍAS ──
  const T=TABS.find(t=>t.id===tab);
  const days=DAYS.filter(d=>d.c===tab);

    <div class="city-intro">

      <div class="city-dr">${days.map(d=>d.d).join("  ·  ")}</div>
    </div>
    ${days.map(day=>`
      <div class="day-card">
        <div class="day-head">
          <div class="ddr">
            <div class="day-num" style="color:${T.color}">${day.d}</div>
            <div class="day-wd">${day.w}</div>
          </div>
          <div class="day-title">${day.t}</div>
          ${day.hotel?`<div class="day-hotel">🏨 ${day.hotel}</div>`:''}
          ${day.zone?`<div class="day-zone">📍 ${day.zone}</div>`:''}
        </div>

        <div class="day-body">
          ${day.a.map(a=>`
            <div class="act-row">
              <div class="at">${a.h}</div>

                ${a.s?`<div class="as">${a.s}</div>`:''}
                ${a.tip?`<div class="atip">${a.tip}</div>`:''}
                ${a.tag==='r'?`<span class="tag-r">Reservar</span>`:''}
                ${a.tag==='u'?`<span class="tag-u">⚠ Urgente</span>`:''}
              </div>
            </div>`).join('')}
        </div>
      </div>`).join('')}`;
}

function go(id){
  tab=id;view="dias";
  ['vd','vr','vf'].forEach(b=>document.getElementById(b).classList.remove('active'));
  document.getElementById('vd').classList.add('active');
  render();
}
function setView(v){
  view=v;
  document.getElementById('vd').classList.toggle('active',v==='dias');
  document.getElementById('vr').classList.toggle('active',v==='reservas');
  document.getElementById('vf').classList.toggle('active',v==='fotos');
  render();
}
function render(){
  renderTabs();renderNav();renderContent();
  document.getElementById("scroll-area").scrollTop=0;
}
render();
