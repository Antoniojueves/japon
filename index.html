*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}

:root{
  --bg:#0D0D0B;

  --border:rgba(255,255,255,.07);
  --text:#F0EDE6;
  --text-dim:rgba(240,237,230,.42);

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
.header{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);padding-top:var(--safe-top)}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.bottom-nav{flex-shrink:0;background:rgba(13,13,11,.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom)}

/* ── HEADER ── */
.header-top{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 16px 0}
.trip-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;line-height:1.1}
.trip-dates{font-size:10px;color:var(--text-dim);margin-top:2px;letter-spacing:.07em;text-transform:uppercase}
.view-btns{display:flex;gap:5px;margin-top:2px}
.view-btn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-size:11px;font-weight:500;padding:5px 10px;cursor:pointer;font-family:inherit;transition:all .18s}
.view-btn.active{background:rgba(255,255,255,.12);color:var(--text);border-color:rgba(255,255,255,.18)}

/* ── CITY TABS ── */
.tab-scroll{display:flex;overflow-x:auto;gap:6px;padding:10px 14px 12px;scrollbar-width:none}
.tab-btn{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:20px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;transition:all .22s;white-space:nowrap;color:rgba(240,237,230,.55);background:rgba(255,255,255,.07)}
.tab-btn.active{color:#fff}

/* ── CONTENT ── */
.content{padding:14px 14px 20px}

/* ── CITY INTRO ── */
.city-intro{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.city-name{font-family:'Cormorant Garamond',serif;font-size:30px;font-style:italic;line-height:1}
.city-dates-range{font-size:10px;color:var(--text-faint);margin-top:4px;letter-spacing:.05em;text-transform:uppercase}

/* ── DAY CARDS ── */
.day-card{background:var(--surface);border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid var(--border)}
.day-head{padding:13px 15px 9px}
.day-date-row{display:flex;align-items:baseline;gap:8px}
.day-num{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;line-height:1}
.day-wd{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.07em}
.day-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;margin-top:3px;color:var(--text)}
.day-hotel{font-size:11px;color:var(--text-dim);margin-top:4px}
.day-zone{font-size:10.5px;color:var(--text-faint);margin-top:2px}
.pass-bar{margin:0 14px 8px;padding:7px 11px;border-radius:9px;font-size:11.5px;font-weight:500}
.day-body{padding:0 15px 12px}

.act-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.045)}
.act-row:last-child{border-bottom:none}
.act-time{width:38px;flex-shrink:0;font-size:10.5px;color:var(--text-dim);font-weight:500;padding-top:3px;text-align:right;font-variant-numeric:tabular-nums}
.act-icon{width:26px;flex-shrink:0;font-size:17px;text-align:center;line-height:1.45}
.act-content{flex:1;min-width:0}
.act-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.3}
.act-desc{font-size:12px;color:rgba(240,237,230,.5);margin-top:3px;line-height:1.5}

.tag-urg{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;background:rgba(200,50,50,.2);color:#FF9090;border:1px solid rgba(200,50,50,.3);display:inline-block;margin-top:5px}

/* ── BOTTOM NAV ── */
.nav-items{display:flex;padding:6px 0 4px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:rgba(240,237,230,.3);cursor:pointer;padding:5px 0;font-family:'DM Sans',sans-serif;font-size:9.5px;font-weight:500;transition:color .18s;letter-spacing:.01em}
.nav-btn .nav-emoji{font-size:20px;line-height:1}

/* ── BOOKINGS ── */
.bookings-section{padding:4px 0}
.bookings-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-style:italic;margin-bottom:4px}
.bookings-sub{font-size:12px;color:var(--text-dim);margin-bottom:16px;line-height:1.5}
.booking-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.booking-row:last-child{border-bottom:none}
.booking-dot{font-size:20px;flex-shrink:0}
.booking-info{flex:1}
.booking-label{font-size:14px;font-weight:500;line-height:1.3}
.booking-when{font-size:11.5px;color:var(--text-dim);margin-top:3px}
.booking-status{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:4px}
.status-high{background:rgba(200,50,50,.18);color:#FF9090;border:1px solid rgba(200,50,50,.28)}

    {h:"12:00",i:"🧳",n:"Recoger maletas del locker",s:"Última comida en Ueno si hay tiempo."},
    {h:"12:30",i:"🚆",n:"Narita Express desde Ueno",s:"~55 min directo a Narita T1."},
    {h:"16:40",i:"✈",n:"Vuelo NRT → MAD",s:"Sichuan Airlines · ref. QDS278."},
  ]},
  {c:"vuelo",d:"6 jul",w:"Lun",t:"Llegada Madrid",a:[
    {h:"07:40",i:"🏠",n:"Aterrizaje Madrid MAD",s:"Fin del viaje de luna de miel. 🎌"},
  ]},
];

const BOOKINGS=[
  {n:"Chichu Art Museum, Naoshima",d:"28 jun",u:"high"},
  {n:"TeamLab Planets (pase tarde)",d:"3 jul",u:"high"},
  {n:"Shibuya Sky",d:"3 jul",u:"high"},
  {n:"Actividad monje / zazen, Ueno",d:"5 jul",u:"high"},
  {n:"Bus Takayama → Shirakawa-go",d:"1 jul",u:"med"},
  {n:"Cena kaiseki en Kyoto",d:"25 jun",u:"med"},
  {n:"Sushi omakase en Shibuya",d:"4 jul",u:"med"},
  {n:"Marunouchi House (recomendable)",d:"23 jun",u:"med"},
];

// ─── STATE ───────────────────────────────────────
let tab="tokyo1", view="dias";

// ─── RENDER TABS ─────────────────────────────────
function renderTabs(){
  document.getElementById("tabs").innerHTML=TABS.map(t=>`
    <button class="tab-btn${tab===t.id?" active":""}" onclick="go('${t.id}')"
      style="${tab===t.id?`background:${t.color};box-shadow:0 3px 14px ${t.color}44;color:#fff`:""}"
    >${t.emoji} ${t.label}</button>
  `).join("");
}

// ─── RENDER BOTTOM NAV ───────────────────────────
function renderNav(){
  document.getElementById("bottom-nav").innerHTML=TABS.map(t=>`
    <button class="nav-btn" onclick="go('${t.id}')" style="${tab===t.id&&view==="dias"?`color:${t.color}`:""}">
      <span class="nav-emoji">${t.emoji}</span>${t.label}
    </button>
  `).join("");
}

// ─── RENDER CONTENT ──────────────────────────────
function renderContent(){
  const el=document.getElementById("content");
  if(view==="reservas"){
    el.innerHTML=`
      <div class="bookings-section">
        <div class="bookings-title">Reservas pendientes</div>
        <div class="bookings-sub">Hazlas con antelación — algunas tienen cupo muy limitado.</div>
        ${BOOKINGS.map(b=>`
          <div class="booking-row">
            <div class="booking-dot">${b.u==="high"?"🔴":"🟡"}</div>
            <div class="booking-info">
              <div class="booking-label">${b.n}</div>
              <div class="booking-when">${b.d}</div>
              <span class="booking-status ${b.u==="high"?"status-high":"status-med"}">${b.u==="high"?"Urgente":"Recomendable"}</span>
            </div>
          </div>
        `).join("")}
      </div>`;
    return;
  }
  const T=TABS.find(t=>t.id===tab);
  const days=DAYS.filter(d=>d.c===tab);
  el.innerHTML=`
    <div class="city-intro">
      <div class="city-name" style="color:${T.color}">${T.emoji} ${T.label}</div>
      <div class="city-dates-range">${days.map(d=>d.d).join("  ·  ")}</div>
    </div>
    ${days.map(day=>`
      <div class="day-card">
        <div class="day-head">
          <div class="day-date-row">
            <div class="day-num" style="color:${T.color}">${day.d}</div>
            <div class="day-wd">${day.w}</div>
          </div>
          <div class="day-title">${day.t}</div>
          ${day.hotel?`<div class="day-hotel">🏨 ${day.hotel}</div>`:""}
          ${day.zone?`<div class="day-zone">📍 ${day.zone}</div>`:""}
        </div>
        ${day.pass?`<div class="pass-bar" style="background:${T.color}20;border-left:3px solid ${T.color};color:${T.color}">${day.pass}</div>`:""}
        <div class="day-body">
          ${day.a.map(a=>`
            <div class="act-row">
              <div class="act-time">${a.h}</div>
              <div class="act-icon">${a.i}</div>
              <div class="act-content">
                <div class="act-title">${a.n}</div>
                ${a.s?`<div class="act-desc">${a.s}</div>`:""}
                ${a.tip?`<div class="act-tip">${a.tip}</div>`:""}
                ${a.tag==="res"?`<span class="tag-res">Reservar</span>`:""}
                ${a.tag==="urg"?`<span class="tag-urg">⚠ Reservar urgente</span>`:""}
              </div>
            </div>
          `).join("")}
        </div>
      </div>
    `).join("")}`;
}

// ─── ACTIONS ─────────────────────────────────────
function go(id){tab=id;view="dias";render();}
function setView(v){
  view=v;
  document.getElementById("btn-dias").classList.toggle("active",v==="dias");
  document.getElementById("btn-res").classList.toggle("active",v==="reservas");
  render();
}
function render(){
  renderTabs();renderNav();renderContent();
  document.getElementById("scroll-area").scrollTop=0;
}

render();
</script>
</body>
</html>
