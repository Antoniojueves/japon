<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
:root{
  --bg:#0D0D0B;--surface:rgba(255,255,255,.045);--border:rgba(255,255,255,.07);
  --text:#F0EDE6;--dim:rgba(240,237,230,.42);--faint:rgba(240,237,230,.22);
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:#0D0D0B;color:var(--text);font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:#0D0D0B}
.header{flex-shrink:0;background:#0D0D0B;border-bottom:1px solid var(--border);padding-top:var(--st)}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;background:#0D0D0B}
.bot{flex-shrink:0;background:#0D0D0B;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);padding-bottom:var(--sb)}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 15px 0}
.trip-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;line-height:1.1}
.trip-dates{font-size:10px;color:var(--dim);margin-top:2px;letter-spacing:.07em;text-transform:uppercase}
/* SUB-TABS */
.sub-tabs{display:flex;gap:0;padding:0 14px 0;border-bottom:1px solid var(--border)}
.sub-tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;padding:10px 6px 9px;cursor:pointer;transition:all .18s;text-align:center;white-space:nowrap}
.sub-tab.active{color:var(--text);border-bottom-color:var(--text)}
.res-btn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--dim);font-size:10px;font-weight:500;padding:5px 9px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .18s}
.res-btn.active{background:rgba(255,255,255,.12);color:var(--text);border-color:rgba(255,255,255,.18)}
.tab-scroll{display:flex;overflow-x:auto;gap:6px;padding:10px 14px 12px;scrollbar-width:none}
.tab-btn{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:20px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;transition:all .22s;white-space:nowrap;color:rgba(240,237,230,.55);background:rgba(255,255,255,.07)}
.tab-btn.active{color:#fff}
.content{padding:14px 14px 20px;background:#0D0D0B;min-height:100%}
.city-intro{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.city-name{font-family:'Cormorant Garamond',serif;font-size:30px;font-style:italic;line-height:1}
.city-dr{font-size:10px;color:var(--faint);margin-top:4px;letter-spacing:.05em;text-transform:uppercase}
.day-card{background:var(--surface);border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid var(--border)}
.day-head{padding:13px 15px 9px}
.ddr{display:flex;align-items:baseline;gap:8px}
.day-num{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;line-height:1}
.day-wd{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.07em}
.day-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;margin-top:3px}
.day-hotel{font-size:11px;color:var(--dim);margin-top:4px}
.day-zone{font-size:10.5px;color:var(--faint);margin-top:2px}
.pass-bar{margin:0 14px 8px;padding:7px 11px;border-radius:9px;font-size:11.5px;font-weight:500}
.day-body{padding:0 15px 12px}
.act-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.045)}
.act-row:last-child{border-bottom:none}
.at{width:38px;flex-shrink:0;font-size:10.5px;color:var(--dim);font-weight:500;padding-top:3px;text-align:right}
.ai{width:26px;flex-shrink:0;font-size:17px;text-align:center;line-height:1.45}
.ac{flex:1;min-width:0}
.an{font-size:14px;font-weight:500;line-height:1.3}
.as{font-size:12px;color:rgba(240,237,230,.5);margin-top:3px;line-height:1.5}
.atip{font-size:11.5px;color:rgba(240,237,230,.38);margin-top:6px;font-style:italic;padding:6px 9px;background:rgba(255,255,255,.04);border-radius:7px;border-left:2px solid rgba(255,255,255,.14);line-height:1.4}
.tag-r{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;background:rgba(196,81,42,.18);color:#F4A07A;border:1px solid rgba(196,81,42,.28);display:inline-block;margin-top:5px}
.tag-u{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;background:rgba(200,50,50,.2);color:#FF9090;border:1px solid rgba(200,50,50,.3);display:inline-block;margin-top:5px}
.nav-items{display:flex;padding:5px 0 3px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:rgba(240,237,230,.3);cursor:pointer;padding:4px 0;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;transition:color .18s}
.ne{font-size:19px;line-height:1.2}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-style:italic;margin-bottom:4px}
.sec-sub{font-size:12px;color:var(--dim);margin-bottom:16px;line-height:1.5}
/* BOOKINGS */
.br{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.br:last-child{border-bottom:none}
.bchk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--dim);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .2s;color:transparent}
.bchk.done{background:#28a87a;border-color:#28a87a;color:#fff}
.bi{flex:1}
.bl{font-size:14px;font-weight:500;line-height:1.3;transition:color .2s}
.bl.done{color:var(--dim);text-decoration:line-through}
.bw{font-size:11px;color:var(--dim);margin-top:2px}
.bn{font-size:11.5px;color:rgba(240,237,230,.42);margin-top:4px;line-height:1.4}
.bb{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:5px}
.bh{background:rgba(200,50,50,.18);color:#FF9090;border:1px solid rgba(200,50,50,.28)}
.bm{background:rgba(200,160,50,.18);color:#E8C46A;border:1px solid rgba(200,160,50,.28)}
.bf{background:rgba(50,120,200,.18);color:#90C0FF;border:1px solid rgba(50,120,200,.28)}
/* PHOTOS */
.photo-card{border-radius:14px;overflow:hidden;margin-bottom:12px;border:1px solid var(--border);background:var(--surface)}
.piw{position:relative;width:100%;padding-top:56%;overflow:hidden;background:#1a1a17;display:flex;align-items:center;justify-content:center}
.pif{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:44px;transition:opacity .3s}
.pimg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s}
.pimg.loaded{opacity:1}
.pinfo{padding:12px 14px}
.pname{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;line-height:1.2}
.psub{font-size:11.5px;color:var(--dim);margin-top:3px;line-height:1.4}
.pdesc{font-size:12px;color:rgba(240,237,230,.45);margin-top:8px;line-height:1.6;padding-top:8px;border-top:1px solid var(--border)}
.pmeta{display:flex;align-items:center;gap:7px;margin-top:8px}
.pcity{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px}
.pdate{font-size:10px;color:var(--faint)}
.ptime{font-size:10px;color:var(--dim);font-weight:500}
.photo-day-group{}
.photo-day-header{display:flex;align-items:center;gap:10px;margin:18px 0 10px;cursor:pointer;user-select:none;-webkit-user-select:none}
.photo-day-header:first-child{margin-top:0}
.photo-day-line{height:1.5px;width:14px;flex-shrink:0;border-radius:2px}
.photo-day-label{display:flex;align-items:baseline;gap:7px;flex:1}
.photo-day-num{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;line-height:1}
.photo-day-wd{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.07em}
.photo-day-count{font-size:10px;color:var(--faint);margin-left:auto}
.photo-day-arrow{font-size:11px;color:var(--faint);transition:transform .3s;flex-shrink:0}
.photo-day-arrow.open{transform:rotate(0deg)}
.photo-day-arrow:not(.open){transform:rotate(-90deg)}
.photo-day-body{overflow:hidden;transition:max-height .35s ease}
.photo-day-body.collapsed{max-height:0!important}
.loading-dots{display:flex;gap:4px;align-items:center;justify-content:center;height:100%}
.loading-dots span{width:5px;height:5px;border-radius:50%;background:rgba(240,237,230,.25);animation:dot 1.2s infinite ease-in-out}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
/* MAPS */
.map-day-group{margin-bottom:4px}
.map-day-header{display:flex;align-items:center;gap:10px;padding:14px 0 10px;cursor:pointer;user-select:none;-webkit-user-select:none;border-bottom:1px solid var(--border)}
.map-day-label{display:flex;align-items:baseline;gap:7px;flex:1}
.map-day-line{height:1.5px;width:14px;flex-shrink:0;border-radius:2px}
.map-day-num{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;line-height:1}
.map-day-wd{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.07em}
.map-day-sub{font-size:10px;color:var(--faint)}
.map-day-arrow{font-size:11px;color:var(--faint);transition:transform .3s;flex-shrink:0}
.map-day-arrow.open{transform:rotate(0deg)}
.map-day-arrow:not(.open){transform:rotate(-90deg)}
.map-day-body{overflow:hidden;transition:max-height .35s ease}
.map-day-body.collapsed{max-height:0!important}
.map-wrap{border-radius:12px;overflow:hidden;margin-bottom:12px;border:1px solid var(--border)}
.leaflet-map{height:280px;width:100%;display:block}
.leaflet-container{background:#1a1a17!important}
.map-legend{padding:10px 12px;background:var(--surface)}
.map-leg-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:11.5px;color:var(--dim)}
.map-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.3)}
.map-leg-time{font-size:10px;color:var(--faint);margin-left:auto;font-weight:500}
</style>
</head>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="trip-title">🎌 Luna de Miel · Japón</div>

      <button class="res-btn" id="vr" onclick="toggleReservas()">⚠ Reservas</button>

      <button class="sub-tab" id="st-ma" onclick="setSub('mapa')">🗺 Mapa</button>
    </div>
  </div>
  <div class="scroll-area" id="scroll-area">
    <div class="content" id="content"></div>
  </div>
  <div class="bot">
    <div class="nav-items" id="bnav"></div>
  </div>
</div>

let tab="tokyo1", subview="itinerario", showReservas=false;
let checks={};
try{checks=JSON.parse(localStorage.getItem('jp_b')||'{}');}catch(e){}
function save(){try{localStorage.setItem('jp_b',JSON.stringify(checks));}catch(e){}}

function toggle(id){
  checks[id]=!checks[id];save();
  const row=document.getElementById('r_'+id);
  if(!row)return;
  row.querySelector('.bchk').classList.toggle('done',!!checks[id]);
  row.querySelector('.bchk').textContent=checks[id]?'✓':'';
  row.querySelector('.bl').classList.toggle('done',!!checks[id]);
}

// ── WIKIPEDIA IMAGE FETCHER ──────────────────────────────
// MediaWiki API with origin=* — if no pageimage, falls back to image search
async function fetchWikiThumb(wikiTitle, imgEl, fallbackEl){
  try{
    // Primary: get page image for exact article
    const api='https://en.wikipedia.org/w/api.php?action=query&prop=pageimages&pithumbsize=800&format=json&origin=*&titles='+encodeURIComponent(wikiTitle);
    const res=await fetch(api);
    if(!res.ok)return;
    const data=await res.json();
    const pages=data.query&&data.query.pages;
    if(!pages)return;
    const page=Object.values(pages)[0];
    if(page&&page.thumbnail&&page.thumbnail.source){
      imgEl.onload=()=>{imgEl.classList.add('loaded');fallbackEl.style.opacity='0';};
      imgEl.src=page.thumbnail.source;
      return;
    }
    // Fallback: search for first article matching the title and get its image
    const api2='https://en.wikipedia.org/w/api.php?action=query&prop=pageimages&pithumbsize=800&format=json&origin=*&generator=search&gsrsearch='+encodeURIComponent(wikiTitle)+'&gsrlimit=1';
    const res2=await fetch(api2);
    if(!res2.ok)return;
    const data2=await res2.json();
    const pages2=data2.query&&data2.query.pages;
    if(!pages2)return;
    const page2=Object.values(pages2)[0];
    if(page2&&page2.thumbnail&&page2.thumbnail.source){
      imgEl.onload=()=>{imgEl.classList.add('loaded');fallbackEl.style.opacity='0';};
      imgEl.src=page2.thumbnail.source;
    }
  }catch(e){/* fallback emoji stays */}
}

function renderNav(){
  document.getElementById("bnav").innerHTML=TABS.map(t=>`
    <button class="nav-btn" onclick="go('${t.id}')"
      style="${tab===t.id?`color:${t.color}`:''}">
      <span class="ne">${t.emoji}</span>${t.label}</button>`).join("");
}

function renderSubTabs(){
  ['it','fo','ma'].forEach(k=>{
    const key=k==='it'?'itinerario':k==='fo'?'fotos':'mapa';
    const el=document.getElementById('st-'+k);
    if(el) el.classList.toggle('active',subview===key&&!showReservas);
  });
  const vr=document.getElementById('vr');
  if(vr) vr.classList.toggle('active',showReservas);
}

function renderContent(){
  const el=document.getElementById("content");
  const T=TABS.find(t=>t.id===tab)||TABS[0];

  // ── RESERVAS ──

    const pend=BOOKINGS.filter(b=>!checks[b.id]).length;
    el.innerHTML=`<div>
      <div class="sec-title">Reservas</div>
      <div class="sec-sub">Toca para marcar como hecha · ${pend} de ${BOOKINGS.length} pendientes</div>
      ${BOOKINGS.map(b=>{const done=!!checks[b.id];return `<div class="br" id="r_${b.id}" onclick="toggle('${b.id}')">

        <div class="bi">
          <div class="bl${done?' done':''}">${b.n}</div>
          <div class="bw">${b.d}</div>
          ${b.note?`<div class="bn">${b.note}</div>`:''}
          <span class="bb ${b.u==='h'?'bh':b.u==='m'?'bm':'bf'}">${b.u==='h'?'Urgente':b.u==='m'?'Recomendable':'Informativo'}</span>

  // ── FOTOS ──
  if(subview==="fotos"){
    const tabPhotos=PHOTOS.map((p,i)=>({...p,gi:i})).filter(p=>p.c===tab);
    const dayKeys=[...new Set(tabPhotos.map(p=>p.d))];
    let html=`<div style="background:#0D0D0B">

        <div class="photo-day-body" id="pbody_${uid}">

let leafletMaps={};

function initAllMaps(){
  if(typeof L==='undefined')return;
  MAPDAYS.forEach((day,di)=>{
    const el=document.getElementById('lmap_'+di);
    if(!el||leafletMaps[di])return;
    const T=TABS.find(t=>t.id===day.c)||{color:"#2E8EE8"};
    const map=L.map(el,{zoomControl:false,attributionControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
      maxZoom:18,subdomains:'abcd'
    }).addTo(map);
    L.control.zoom({position:'bottomright'}).addTo(map);
    const bounds=[];
    day.pts.forEach((p,pi)=>{
      const ll=[p.lat,p.lng];
      bounds.push(ll);
      const icon=L.divIcon({
        html:`<div style="background:${T.color};color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid rgba(255,255,255,.4);box-shadow:0 2px 8px rgba(0,0,0,.5)">${pi+1}</div>`,
        className:'',iconSize:[28,28],iconAnchor:[14,14]
      });
      L.marker(ll,{icon}).addTo(map)
        .bindPopup(`<b style="font-size:13px">${p.n}</b><br><span style="color:#888;font-size:11px">🕐 ${p.h}</span>`);
    });
    if(bounds.length===1){
      map.setView(bounds[0],15);
    } else {
      map.fitBounds(bounds,{padding:[30,30]});
    }
    leafletMaps[di]=map;
  });
}

function toggleMapDay(di){
  const body=document.getElementById('mbody_'+di);
  const arr=document.getElementById('marr_'+di);
  if(!body)return;
  const isOpen=arr&&arr.classList.contains('open');
  if(isOpen){
    body.style.maxHeight=body.scrollHeight+'px';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      body.classList.add('collapsed');
      body.style.maxHeight='0';
      arr&&arr.classList.remove('open');
    }));
  } else {
    body.classList.remove('collapsed');
    body.style.maxHeight=body.scrollHeight+'px';
    arr&&arr.classList.add('open');
    body.addEventListener('transitionend',()=>{
      body.style.maxHeight='none';
      // Refresh map after expand
      if(leafletMaps[di]) leafletMaps[di].invalidateSize();
    },{once:true});
    // Also try to init if not done yet
    setTimeout(()=>{
      if(!leafletMaps[di]) initAllMaps();
      else leafletMaps[di].invalidateSize();
    },350);
  }
}

function togglePhotoDay(di){
  const body=document.getElementById('pbody_'+di);
  const arr=document.getElementById('parr_'+di);
  if(!body)return;
  const isOpen=arr&&arr.classList.contains('open');
  if(isOpen){
    // Collapse: pin current height first, then animate to 0
    body.style.maxHeight=body.scrollHeight+'px';
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        body.classList.add('collapsed');
        body.style.maxHeight='0';
        arr&&arr.classList.remove('open');
      });
    });
  } else {
    // Expand: set target height, then clear max-height after transition
    body.classList.remove('collapsed');
    body.style.maxHeight=body.scrollHeight+'px';
    arr&&arr.classList.add('open');
    body.addEventListener('transitionend',()=>{
      body.style.maxHeight='none';
    },{once:true});
  }
}

function go(id){
  tab=id; showReservas=false;
  render();
}
function setSub(sv){
  subview=sv; showReservas=false;
  render();
}
function toggleReservas(){
  showReservas=!showReservas;
  render();
}
function render(){
  renderNav(); renderSubTabs(); renderContent();
  document.getElementById("scroll-area").scrollTop=0;
}
render();
